<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个人主页">
    <title>个人主页</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">我的主页</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#projects">项目</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1>欢迎来到我的主页</h1>
                <p>刘帅男的个人主页</p>
                <a href="#projects" class="btn">查看项目</a>
            </div>
        </section>

        <section id="about" class="about">
            <div class="container">
                <h2>关于我</h2>
                <p>在这里介绍你自己，你的技能、兴趣和经历。</p>
            </div>
        </section>

        <section id="projects" class="projects">
            <div class="container">
                <h2>我的项目</h2>
                <div class="project-grid">
                    <div class="project-card">
                        <h3>项目 1</h3>
                        <p>项目描述</p>
                        <a href="#" class="project-link">查看详情</a>
                    </div>
                    <div class="project-card">
                        <h3>项目 2</h3>
                        <p>项目描述</p>
                        <a href="#" class="project-link">查看详情</a>
                    </div>
                    <div class="project-card">
                        <h3>项目 3</h3>
                        <p>项目描述</p>
                        <a href="#" class="project-link">查看详情</a>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact" class="contact">
            <div class="container">
                <h2>联系我</h2>
                <p>Email: your.email@example.com</p>
                <div class="social-links">
                    <a href="#">GitHub</a>
                    <a href="#">LinkedIn</a>
                    <a href="#">Twitter</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 个人主页. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
